<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Task - Fetch Data</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #display-area {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #007bff;
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: #555;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dynamic API Fetcher</h1>
        
        <div id="display-area">
            <p id="content">Click the button to fetch a joke!</p>
        </div>

        <button id="fetch-btn">Fetch New Joke</button>
    </div>

    <script>
        const contentLabel = document.getElementById('content');
        const fetchBtn = document.getElementById('fetch-btn');

        // Function to call Public API
        async function fetchJoke() {
            // Loading state
            contentLabel.innerHTML = "Fetching something funny... ⏳";
            
            try {
                // Fetching data from JokeAPI
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single');
                
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const data = await response.json();

                // Updating the DOM with API data
                if (data.joke) {
                    contentLabel.innerText = data.joke;
                } else {
                    contentLabel.innerText = "Oops, couldn't find a joke this time!";
                }

            } catch (error) {
                console.error("Error:", error);
                contentLabel.innerText = "Failed to fetch data. Please check your internet.";
                contentLabel.style.color = "red";
            }
        }

        // Event Listener for the button
        fetchBtn.addEventListener('click', fetchJoke);
    </script>

</body>
</html>
